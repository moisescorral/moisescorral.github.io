<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title{font-family:'Arial Narrow','Impact',sans-serif;font-size:86px;font-weight:900;letter-spacing:6px;fill:#efe5cf}
      .subtitle{font-family:Arial,sans-serif;font-size:28px;letter-spacing:7px;fill:#efe5cf}
      .small{font-family:Arial,sans-serif;font-size:22px;letter-spacing:4px;fill:#efe5cf}
      .cream{fill:#efe5cf}
      .stroke{stroke:#efe5cf;stroke-width:5;fill:none}
      .thin{stroke:#efe5cf;stroke-width:2;fill:none;opacity:.85}
      .divider{stroke:#efe5cf;stroke-width:3;opacity:.85}
      .plate{stroke:#101010;stroke-width:8}
      .inner{stroke:#efe5cf;stroke-width:4;fill:none;opacity:.9}
    </style>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity=".25"/></filter>
    <pattern id="scratches" patternUnits="userSpaceOnUse" width="120" height="120">
      <path d="M10 40 L90 15 M20 110 L115 70 M55 95 L90 105" stroke="#efe5cf" stroke-width="1" opacity=".10"/>
      <circle cx="30" cy="25" r="1.5" fill="#efe5cf" opacity=".15"/>
      <circle cx="80" cy="85" r="1" fill="#efe5cf" opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="#f6f4ef"/>

  <!-- PLANTILLA: cada cartel está en un grupo editable separado -->

  <g id="cartel-murmansk" transform="translate(20 40)" filter="url(#shadow)">
    <rect id="fondo-murmansk" width="740" height="230" rx="14" fill="#062033" class="plate"/>
    <rect width="720" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="740" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-ancla-murmansk" transform="translate(55 48) scale(1.25)" class="cream">
      <circle cx="55" cy="16" r="13" fill="none" stroke="#efe5cf" stroke-width="8"/>
      <rect x="50" y="30" width="10" height="85"/>
      <path d="M18 88 C25 132 85 132 92 88" fill="none" stroke="#efe5cf" stroke-width="9"/>
      <path d="M18 88 L4 105 L32 107 Z"/>
      <path d="M92 88 L106 105 L78 107 Z"/>
      <path d="M31 57 H79" stroke="#efe5cf" stroke-width="8"/>
    </g>
    <line x1="205" y1="35" x2="205" y2="195" class="divider"/>
    <text id="texto-murmansk" x="240" y="118" class="title">MURMANSK</text>
    <line x1="240" y1="155" x2="300" y2="155" class="thin"/>
    <text x="315" y="165" class="small">SEDE DE LA FLOTA NAVAL RUSA</text>
    <line x1="690" y1="155" x2="720" y2="155" class="thin"/>
  </g>

  <g id="cartel-moscu" transform="translate(800 40)" filter="url(#shadow)">
    <rect id="fondo-moscu" width="760" height="230" rx="14" fill="#5a1410" class="plate"/>
    <rect width="740" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="760" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-kremlin-moscu" transform="translate(875 75)" class="cream">
      <rect x="0" y="80" width="125" height="70"/>
      <rect x="18" y="52" width="35" height="98"/>
      <rect x="72" y="45" width="35" height="105"/>
      <path d="M35 0 L55 52 H15 Z"/>
      <path d="M89 -8 L111 45 H67 Z"/>
      <polygon points="89,-25 94,-13 107,-13 96,-5 100,8 89,0 78,8 82,-5 71,-13 84,-13"/>
      <rect x="42" y="112" width="28" height="38"/>
      <circle cx="89" cy="78" r="12" fill="none" stroke="#efe5cf" stroke-width="5"/>
    </g>
    <line x1="995" y1="35" x2="995" y2="195" class="divider"/>
    <text id="texto-moscu" x="1040" y="123" class="title">MOSCÚ</text>
    <line x1="980" y1="164" x2="1125" y2="164" class="thin"/>
    <text x="1155" y="174" class="subtitle">RUSIA</text>
    <line x1="1340" y1="164" x2="1515" y2="164" class="thin"/>
  </g>

  <g id="cartel-san-petersburgo" transform="translate(20 300)" filter="url(#shadow)">
    <rect id="fondo-san-petersburgo" width="740" height="230" rx="14" fill="#062033" class="plate"/>
    <rect width="720" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="740" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-aguja-san-petersburgo" transform="translate(55 52)" class="cream">
      <rect x="0" y="125" width="135" height="30"/>
      <rect x="15" y="85" width="105" height="40"/>
      <path d="M20 85 Q68 38 115 85 Z"/>
      <rect x="62" y="18" width="12" height="67"/>
      <path d="M68 -20 L78 18 H58 Z"/>
      <rect x="32" y="105" width="14" height="50"/>
      <rect x="61" y="103" width="14" height="52"/>
      <rect x="90" y="105" width="14" height="50"/>
    </g>
    <line x1="205" y1="35" x2="205" y2="195" class="divider"/>
    <text id="texto-san-petersburgo" x="240" y="122" class="title" style="font-size:72px;letter-spacing:3px">SAN PETERSBURGO</text>
    <line x1="240" y1="162" x2="390" y2="162" class="thin"/>
    <text x="420" y="172" class="subtitle">RUSIA</text>
    <line x1="555" y1="162" x2="720" y2="162" class="thin"/>
  </g>

  <g id="cartel-ramstein" transform="translate(800 300)" filter="url(#shadow)">
    <rect id="fondo-ramstein" width="760" height="230" rx="14" fill="#06341f" class="plate"/>
    <rect width="740" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="760" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-otan-ramstein" transform="translate(855 62)" class="cream">
      <circle cx="70" cy="70" r="58" fill="none" stroke="#efe5cf" stroke-width="4"/>
      <polygon points="70,0 88,70 70,140 52,70"/>
      <polygon points="0,70 70,52 140,70 70,88"/>
      <line x1="70" y1="-20" x2="70" y2="160" class="thin"/>
      <line x1="-20" y1="70" x2="160" y2="70" class="thin"/>
    </g>
    <line x1="995" y1="35" x2="995" y2="195" class="divider"/>
    <text id="texto-ramstein" x="1040" y="125" class="title" style="font-size:82px">RAMSTEIN</text>
    <text x="1070" y="176" class="subtitle" style="font-size:28px">BASE AÉREA — ALEMANIA</text>
  </g>

  <g id="cartel-belgorov" transform="translate(20 560)" filter="url(#shadow)">
    <rect id="fondo-belgorov" width="740" height="230" rx="14" fill="#263a14" class="plate"/>
    <rect width="720" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="740" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-fortaleza-belgorov" transform="translate(55 80)" class="cream">
      <rect x="0" y="55" width="145" height="85"/>
      <rect x="22" y="20" width="35" height="120"/>
      <rect x="88" y="20" width="35" height="120"/>
      <path d="M22 20 L39 0 L57 20 Z"/>
      <path d="M88 20 L106 0 L123 20 Z"/>
      <path d="M58 55 Q72 30 88 55 Z"/>
      <rect x="60" y="100" width="28" height="40"/>
    </g>
    <line x1="205" y1="35" x2="205" y2="195" class="divider"/>
    <text id="texto-belgorov" x="250" y="118" class="title">BELGOROV</text>
    <text x="250" y="175" class="small">RUSIA — CERCA DE LA FRONTERA CON UCRANIA</text>
  </g>

  <g id="cartel-koashv" transform="translate(800 560)" filter="url(#shadow)">
    <rect id="fondo-koashv" width="760" height="230" rx="14" fill="#2b241b" class="plate"/>
    <rect width="740" height="210" x="10" y="10" rx="10" class="inner"/>
    <rect width="760" height="230" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-mina-koashv" transform="translate(835 65)" class="cream">
      <ellipse cx="85" cy="55" rx="80" ry="42" fill="none" stroke="#efe5cf" stroke-width="8"/>
      <ellipse cx="85" cy="55" rx="60" ry="30" fill="none" stroke="#efe5cf" stroke-width="6"/>
      <ellipse cx="85" cy="55" rx="38" ry="18" fill="none" stroke="#efe5cf" stroke-width="5"/>
      <path d="M15 85 L155 85 L125 115 L45 115 Z" fill="none" stroke="#efe5cf" stroke-width="6"/>
      <g transform="translate(95 108)">
        <rect x="0" y="20" width="70" height="30"/>
        <circle cx="15" cy="55" r="12"/>
        <circle cx="55" cy="55" r="12"/>
        <path d="M8 20 L36 0 L58 20 Z"/>
        <rect x="62" y="8" width="35" height="9"/>
      </g>
    </g>
    <line x1="250" y1="35" x2="250" y2="195" class="divider"/>
    <text id="texto-koashv" x="285" y="116" class="title">KOASHV</text>
    <line x1="285" y1="150" x2="330" y2="150" class="thin"/>
    <text x="345" y="160" class="small">PENÍNSULA DE KOLA — RUSIA</text>
    <line x1="690" y1="150" x2="735" y2="150" class="thin"/>
    <line x1="360" y1="188" x2="410" y2="188" class="thin"/>
    <text x="425" y="198" class="small">MINA DE CIELO ABIERTO</text>
    <line x1="690" y1="188" x2="735" y2="188" class="thin"/>
  </g>

  <g id="cartel-estambul" transform="translate(400 805)" filter="url(#shadow)">
    <rect id="fondo-estambul" width="740" height="170" rx="14" fill="#06343b" class="plate"/>
    <rect width="720" height="150" x="10" y="10" rx="10" class="inner"/>
    <rect width="740" height="170" rx="14" fill="url(#scratches)" opacity=".8"/>
    <g id="icono-mezquita-estambul" transform="translate(445 845)" class="cream">
      <rect x="0" y="65" width="145" height="45"/>
      <path d="M25 65 Q72 5 120 65 Z"/>
      <rect x="-5" y="20" width="12" height="90"/>
      <path d="M1 -10 L10 20 H-8 Z"/>
      <rect x="138" y="20" width="12" height="90"/>
      <path d="M144 -10 L153 20 H135 Z"/>
      <rect x="66" y="60" width="18" height="50"/>
    </g>
    <line x1="590" y1="830" x2="590" y2="950" class="divider"/>
    <text id="texto-estambul" x="630" y="910" class="title" style="font-size:80px">ESTAMBÚL</text>
    <line x1="620" y1="942" x2="750" y2="942" class="thin"/>
    <text x="780" y="952" class="subtitle" style="font-size:28px">TURQUÍA</text>
    <line x1="930" y1="942" x2="1095" y2="942" class="thin"/>
  </g>
</svg>